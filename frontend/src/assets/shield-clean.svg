<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="shieldGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6be4"/>
      <stop offset="100%" style="stop-color:#0f2d6e"/>
    </linearGradient>
    <linearGradient id="shieldHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,20,80,0.35)"/>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M 100,12
           L 182,44
           L 182,110
           Q 182,168 100,208
           Q 18,168 18,110
           L 18,44
           Z"
        fill="url(#shieldGrad)"
        filter="url(#shadow)"/>

  <!-- Inner highlight overlay -->
  <path d="M 100,12
           L 182,44
           L 182,110
           Q 182,168 100,208
           Q 18,168 18,110
           L 18,44
           Z"
        fill="url(#shieldHighlight)"/>

  <!-- Thin inner border -->
  <path d="M 100,24
           L 170,52
           L 170,110
           Q 170,160 100,196
           Q 30,160 30,110
           L 30,52
           Z"
        fill="none"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="1"/>

  <!-- Lock shackle -->
  <path d="M 74,108 L 74,92 Q 74,72 100,72 Q 126,72 126,92 L 126,108"
        fill="none"
        stroke="white"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Lock body -->
  <rect x="64" y="106" width="72" height="56" rx="10"
        fill="white"/>

  <!-- Keyhole circle -->
  <circle cx="100" cy="128" r="10" fill="url(#shieldGrad)"/>
  <!-- Keyhole slot -->
  <rect x="96" y="128" width="8" height="14" rx="3" fill="url(#shieldGrad)"/>
</svg>
